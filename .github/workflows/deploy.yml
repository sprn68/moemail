name: Deploy

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  # 强制 GitHub Actions 插件使用 Node 24 运行，消除过时警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. 先设置 Node.js，并确保它是 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 2. 使用 v4 版本的 pnpm setup，它会自动关联上面设置好的 Node 22
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          # 这一行很关键：确保 pnpm 使用 setup-node 安装的那个 Node 22
          run_install: false 

      # 3. 验证环境（如果还报错，看这一步的输出）
      - name: Verify Environment
        run: |
          node -v
          pnpm -v

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run deploy script
        env:
          # 确保这些 Secret 在 GitHub Repo Settings 中已配置
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          PROJECT_NAME: ${{ secrets.PROJECT_NAME }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
          DATABASE_ID: ${{ secrets.DATABASE_ID }}
          KV_NAMESPACE_NAME: ${{ secrets.KV_NAMESPACE_NAME }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          CUSTOM_DOMAIN: ${{ secrets.CUSTOM_DOMAIN }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        # 使用 pnpm exec 而不是 dlx，有时可以避免重新下载带来的版本偏差
        run: pnpm tsx scripts/deploy/index.ts

      - name: Post deployment cleanup
        if: always()
        run: |
          rm -f .env*.*
          rm -f wrangler*.json
